<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FERMA TP - Logistics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 30px; }
        .header-brand { background: #004a99; color: white; padding: 25px; text-align: center; border-radius: 0 0 20px 20px; margin-bottom: 20px; }
        .btn-primary { background-color: #004a99; border: none; padding: 12px; font-weight: bold; }
        .btn-primary:hover { background-color: #003570; }
        label { font-weight: 600; color: #444; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="header-brand">
    <h2>FERMA TP - لوجيستيك</h2>
    <p>نظام تتبع الشاحنات والسلع | إعداد: هشام جران</p>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 form-container">
            <form id="logisticForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>رقم الشاحنة (Matricule)</label>
                        <input type="text" id="matricule" class="form-control" placeholder="مثلاً: 44-أ-1234" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>السائق (Chauffeur)</label>
                        <input type="text" id="chauffeur" class="form-control" placeholder="اسم السائق" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>نوع العملية</label>
                        <select id="flux" class="form-select">
                            <option value="Entrée">دخول سلعة (Entrée)</option>
                            <option value="Sortie">خروج سلعة (Sortie)</option>
                            <option value="Interne">تحرك داخلي</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>المادة (Produit)</label>
                        <input type="text" id="produit" class="form-control" placeholder="رملة، كياس، حديد..." required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>الكمية (Tonne/m³)</label>
                        <input type="number" id="quantite" class="form-control" step="0.01" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>رقم البون (N° Bon)</label>
                        <input type="text" id="nbon" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>المازوط (Litre)</label>
                        <input type="number" id="gasoil" class="form-control" value="0">
                    </div>
                </div>

                <div class="mb-4">
                    <label>الورش / الوجهة (Chantier)</label>
                    <input type="text" id="chantier" class="form-control" placeholder="مثلاً: مشروع الصفاء، ماجوريل..." required>
                </div>

                <button type="submit" class="btn btn-primary w-100" id="submitBtn">إرسال البيانات إلى Google Sheets</button>
            </form>
            
            <div id="responseMessage" class="mt-3 text-center" style="display:none;">
                <div class="alert alert-success">تم تسجيل المعطيات بنجاح!</div>
            </div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxt8QRUhn8fCEbpePnsv2dE4IEZA0zM_p75Haj_kg9AT_mOKKp_fjm462TryWxIaihX/exec';
    const form = document.getElementById('logisticForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('responseMessage');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'جاري الإرسال...';

        // تجميع البيانات
        const formData = {
            matricule: document.getElementById('matricule').value,
            chauffeur: document.getElementById('chauffeur').value,
            flux: document.getElementById('flux').value,
            produit: document.getElementById('produit').value,
            quantite: document.getElementById('quantite').value,
            nbon: document.getElementById('nbon').value,
            gasoil: document.getElementById('gasoil').value,
            chantier: document.getElementById('chantier').value
        };

        // إرسال البيانات
        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(() => {
            msg.style.display = 'block';
            form.reset();
            btn.disabled = false;
            btn.innerText = 'إرسال البيانات إلى Google Sheets';
            setTimeout(() => { msg.style.display = 'none'; }, 4000);
        })
        .catch(error => {
            console.error('Error!', error.message);
            alert('وقع خطأ أثناء الإرسال. تأكد من إعدادات الـ Script.');
            btn.disabled = false;
            btn.innerText = 'إرسال البيانات إلى Google Sheets';
        });
    });
</script>

</body>
</html>
