<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FERMA TP - Logistics Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .form-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-top: 20px; }
        .header-brand { background: #004a99; color: white; padding: 20px; text-align: center; border-radius: 15px; }
        .preview-img { max-width: 100%; height: auto; border-radius: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="header-brand">
        <h2>نظام اللوجيستيك المتطور - FERMA TP</h2>
        <p>بواسطة: هشام جران | تخصص لوجيستيك </p>
    </div>

    <div class="form-container mb-5">
        <form id="logisticForm">
            <div class="row mb-3">
                <div class="col-6"><label>رقم الشاحنة</label><input type="text" id="matricule" class="form-control" required></div>
                <div class="col-6"><label>السائق</label><input type="text" id="chauffeur" class="form-control" required></div>
            </div>

            <div class="row mb-3">
                <div class="col-6"><label>المادة (Produit)</label><input type="text" id="produit" class="form-control" required></div>
                <div class="col-6"><label>الكمية (Tonne)</label><input type="number" id="quantite" class="form-control" required></div>
            </div>

            <div class="row mb-3">
                <div class="col-6"><label>رقم البون</label><input type="text" id="nbon" class="form-control" required></div>
                <div class="col-6"><label>المازوط (Litre)</label><input type="number" id="gasoil" class="form-control" value="0"></div>
            </div>

            <div class="mb-3">
                <label>الورش (Chantier)</label>
                <input type="text" id="chantier" class="form-control" placeholder="مثلاً: مشروع الصفاء" required>
            </div>

            <div class="mb-4">
                <label class="btn btn-outline-primary w-100">
                    📸 تصوير بون الميزان
                    <input type="file" id="photo" accept="image/*" capture="camera" style="display:none;">
                </label>
                <img id="preview" class="preview-img">
            </div>

            <button type="submit" class="btn btn-primary w-100 p-3" id="submitBtn">تسجيل وتأكيد البيانات</button>
        </form>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxt8QRUhn8fCEbpePnsv2dE4IEZA0zM_p75Haj_kg9AT_mOKKp_fjm462TryWxIaihX/exec';
    const photoInput = document.getElementById('photo');
    const preview = document.getElementById('preview');
    let base64Image = "";

    // عرض معاينة للصورة بعد الالتقاط
    photoInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                base64Image = e.target.result.split(',')[1]; // تحويل الصورة لنص
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('logisticForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = 'جاري الرفع...';

        const data = {
            matricule: document.getElementById('matricule').value,
            chauffeur: document.getElementById('chauffeur').value,
            produit: document.getElementById('produit').value,
            quantite: document.getElementById('quantite').value,
            nbon: document.getElementById('nbon').value,
            gasoil: document.getElementById('gasoil').value,
            chantier: document.getElementById('chantier').value,
            image: base64Image // إرسال الصورة كـ Base64
        };

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors',
            body: JSON.stringify(data)
        }).then(() => {
            alert('تم تسجيل المعطيات مع الصورة بنجاح!');
            location.reload();
        });
    });
</script>
</body>
</html>
